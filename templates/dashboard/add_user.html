{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

 
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- ✅ Sidebar -->
        {% include 'dashboard/sidebar.html' %}

        <!-- ✅ Main Content -->
        <div class="col-md-10 p-4">

            <!-- Top Bar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Add User</h4>
                <a href="{% url 'users' %}" class="btn btn-secondary">← Back</a>
            </div>

            <!-- ✅ Form Card -->
            <div class="card shadow-sm p-4">

                <form action="{% url 'add_user' %}" method="POST">
                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <!-- Staff -->
                    <div class="form-check mb-2">
                        <input type="checkbox" name="is_staff" class="form-check-input" id="staffCheck">
                        <label class="form-check-label" for="staffCheck">Staff Access</label>
                    </div>

                    <!-- Superuser -->
                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_superuser" class="form-check-input" id="superCheck">
                        <label class="form-check-label" for="superCheck">Superuser Access</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-success">Create User</button>

                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
</div>
