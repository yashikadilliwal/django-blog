
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Top Bar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Add New Blog</h4>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">← Back</a>
            </div>

            <!-- Form Card -->
            <div class="card shadow-sm p-4">

                <form action="{% url 'add_post' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control">
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select">
                            {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.category_name}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Short Description -->
                    <div class="mb-3">
                        <label class="form-label">Short Description</label>
                        <input type="text" name="short_description" class="form-control">
                    </div>

                    <!-- Image -->
                    <div class="mb-3">
                        <label class="form-label">Feature Image</label>
                        <input type="file" name="feature_image" class="form-control">
                    </div>

                    <!-- Blog Body -->
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="blog_body" id="editor"></textarea>
                    </div>

                    <!-- Options -->
                    <div class="form-check mb-2">
                        <input type="checkbox" name="status" class="form-check-input">
                        <label class="form-check-label">Publish</label>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_featured" class="form-check-input">
                        <label class="form-check-label">Featured</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary">💾 Save Blog</button>

                </form>

            </div>

        </div>

    </div>
</div>


<script src="https://cdn.tiny.cloud/1/fx4q854b0f5sj8tq70eao71cm8de3642y8o0rs0oo97mxdi8/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>

<script>
document.querySelector("form").addEventListener("submit", function () {
    tinymce.triggerSave();
});  
tinymce.init({
    selector: '#editor',
    height: 400,
    menubar: false,
    plugins: [
        'advlist', 'autolink', 'lists', 'link', 'image',
        'preview', 'searchreplace', 'code', 'fullscreen',
        'table', 'wordcount'
    ],
    toolbar:
        'undo redo | formatselect | bold italic | ' +
        'alignleft aligncenter alignright | ' +
        'bullist numlist | link image | code'

    
});
</script>
</body>
</html>
