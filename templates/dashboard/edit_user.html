{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

 
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- ✅ Sidebar -->
        {% include 'dashboard/sidebar.html' %}

        <!-- ✅ Main Content -->
        <div class="col-md-10 p-4">

            <!-- Top Bar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Add User</h4>
                <a href="{% url 'users' %}" class="btn btn-secondary">← Back</a>
            </div>


<h3>Edit User</h3>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" value="{{ user.username }}" class="form-control mb-2">
    <input type="email" name="email" value="{{ user.email }}" class="form-control mb-2">
    <input type="password" name="password" placeholder="New Password (optional)" class="form-control mb-2">

    <div class="form-check">
        <input type="checkbox" name="is_staff" class="form-check-input"
            {% if user.is_staff %}checked{% endif %}>
        <label>Staff</label>
    </div>

    <div class="form-check">
        <input type="checkbox" name="is_superuser" class="form-check-input"
            {% if user.is_superuser %}checked{% endif %}>
        <label>Superuser</label>
    </div>

    <button class="btn btn-primary mt-3">Update</button>
</form>


            

        </div>

    </div>
</div>

</body>
</html>
</div>
