{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Top Bar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Edit Blog</h4>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">← Back</a>
            </div>

            <!-- Form Card -->
            <div class="card shadow-sm p-4">

                <form action="{% url 'edit_post' post.id %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" value="{{ post.title }}">
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select">
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if cat.id == post.category.id %}selected{% endif %}>
                                    {{ cat.category_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Short Description -->
                    <div class="mb-3">
                        <label class="form-label">Short Description</label>
                        <input type="text" name="short_description" class="form-control" value="{{ post.short_description }}">
                    </div>

                    <!-- Image Preview -->
                    <div class="mb-3">
                        <label class="form-label">Current Image</label><br>
                        {% if post.feature_image %}
                            <img src="{{ post.feature_image.url }}" width="150" class="mb-2">
                        {% endif %}
                        <input type="file" name="feature_image" class="form-control">
                    </div>

                    <!-- Blog Body -->
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="blog_body" id="editor">{{ post.blog_body }}</textarea>
                    </div>

                    <!-- Options -->
                    <div class="form-check mb-2">
                        <input type="checkbox" name="status" class="form-check-input"
                               {% if post.status %}checked{% endif %}>
                        <label class="form-check-label">Publish</label>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_featured" class="form-check-input"
                               {% if post.is_featured %}checked{% endif %}>
                        <label class="form-check-label">Featured</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary">✏ Update Blog</button>

                </form>

            </div>

        </div>

    </div>
</div>

<!-- TinyMCE -->
<script src="https://cdn.tiny.cloud/1/fx4q854b0f5sj8tq70eao71cm8de3642y8o0rs0oo97mxdi8/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>

<script>
document.querySelector("form").addEventListener("submit", function () {
    tinymce.triggerSave();
});  
tinymce.init({
    selector: '#editor',
    height: 400,
    menubar: false,
    plugins: [
        'advlist', 'autolink', 'lists', 'link', 'image',
        'preview', 'searchreplace', 'code', 'fullscreen',
        'table', 'wordcount'
    ],
    toolbar:
        'undo redo | formatselect | bold italic | ' +
        'alignleft aligncenter alignright | ' +
        'bullist numlist | link image | code'

    
});
</script>

</body>
</html>
