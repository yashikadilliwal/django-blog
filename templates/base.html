<!-- header part -->
 {% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Django Blogs</title>
  <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
  <link href="{% static 'css/blog.css' %}" rel="stylesheet">
  <script>
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark-mode");
  }
</script>
</head>

<body>
  <div class="container">
    <header class="blog-header py-3">
      <div class="row flex-nowrap justify-content-between align-items-center">
        <div class="col-4 pt-1"> <a class="blog-header-logo " href="/">Django Blog</a> </div>
        <div class="col-4">
            <form action="{% url 'search' %}" method="GET">
              <div class="input-group">
                <input class="form-control" type="text" name="keyword" value="{{ keyword }}" placeholder="Enter search term..." aria-label="Enter search term..." aria-describedby="button-search" />
                <button type="submit" class="btn btn-warning" id="button-search" type="button">Go!</button>
            </div>
            </form>
          </div>
       <div class="col-4 d-flex justify-content-end align-items-center">
  <button id="themeToggle" class="btn btn-sm btn-dark mr-2">
    🌙 
  </button>
  {% if not user.is_authenticated %}
  <a class="btn btn-sm btn-warning" href="{% url 'login' %}">Login</a>
  &nbsp;
  <a class="btn btn-sm btn-outline-secondary" href="{% url 'register' %}">Register</a>
  {% else %}
  &nbsp;
  <a class="btn btn-sm btn-dark "href="{% url 'dashboard' %}">Dashboard</a>
   &nbsp;
  <a class="btn btn-sm btn-danger "href="{% url 'logout' %}">Logout</a>
  {% endif %}
  
 
</div>
      </div>
    </header>
    <div class="nav-scroller py-2 mb-3">
  <nav class="nav d-flex justify-content-between align-items-center"> 

    {% for cat in categories %}
      <a class="nav-link-custom" href="{% url 'posts_by_category' cat.id %}">
        {{ cat.category_name|title }}
      </a>
    {% endfor %}

  </nav>
</div>
<!-- main content -->

{% block content %}

{% endblock %}

   


<!-- footer part -->

<footer class="blog-footer">
    <p>Django blog built with ❤️ by <a href="#">Yashi</a></p>
  </footer>

  <script>
    const toggleBtn = document.getElementById("themeToggle");

    document.addEventListener("DOMContentLoaded", function () {
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
        toggleBtn.textContent = "☀";
        toggleBtn.classList.remove("btn-dark");
        toggleBtn.classList.add("btn-light");
      } else {
        toggleBtn.textContent = "🌙";
      }
   });

    toggleBtn.addEventListener("click", function () {
      document.body.classList.toggle("dark-mode");

      if (document.body.classList.contains("dark-mode")) {
        toggleBtn.textContent = "☀";
        toggleBtn.classList.remove("btn-dark");
        toggleBtn.classList.add("btn-light");
        localStorage.setItem("theme", "dark");
      } else {
        toggleBtn.textContent = "🌙";
        toggleBtn.classList.remove("btn-light");
        toggleBtn.classList.add("btn-dark");
        localStorage.setItem("theme", "light");
      }
      });
</script>
</body>

</html>
