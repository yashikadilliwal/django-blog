{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
{% load crispy_forms_tags %}
    <h2 class="text-center">Register</h2>
    <form action="{% url 'register' %}" method="post" style="width: 500px; margin: auto;" class=" mb-4">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-warning">Register</button>
    </form>
{% endblock %}
