{% extends 'base.html' %}

{% block content %}
    {% load crispy_forms_tags %}
    <h2 class="text-center">Login</h2>
    <form action="{% url 'login' %}" method="post" style="width: 500px; margin: auto; " class=" mb-4">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
{% endblock %}
